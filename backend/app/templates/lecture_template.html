<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ title }} – Neurativo</title>

    <style>
        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Proper Print Margins (Controlled by Playwright) */
        @page {
            size: A4;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
            color: #1f2937;
            font-size: 14px;
            line-height: 1.75;
            background: #ffffff;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        /* ===== BRAND HEADER ===== */
        .brand {
            font-family: Georgia, serif;
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 35px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .brand span {
            font-family: -apple-system, sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9ca3af;
        }

        /* ===== TITLE ===== */
        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.3px;
            margin: 0 0 18px 0;
            color: #111827;
        }

        /* ===== META ===== */
        .meta {
            display: flex;
            gap: 48px;
            margin-bottom: 55px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        /* ===== SECTION TITLE ===== */
        h2 {
            font-family: Georgia, serif;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
            letter-spacing: -0.2px;
        }

        h3 {
            font-size: 16px;
            font-weight: 700;
            margin: 24px 0 10px 0;
            color: #111827;
        }

        /* ===== SUMMARY CARD ===== */
        .summary-card {
            background: #94c4f3;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #f1f5f9;
            display: block;
            page-break-inside: auto;
        }

        .summary-card p {
            margin-bottom: 16px;
            color: #475569;
        }

        .summary-card ul {
            padding-left: 22px;
            margin-bottom: 20px;
        }

        .summary-card li {
            margin-bottom: 9px;
            color: #475569;
        }

        .summary-card li::marker {
            color: #2563eb;
        }

        .summary-card strong {
            font-weight: 600;
            color: #111827;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="brand">
            Neurativo
            <span>Lecture Report</span>
        </div>

        <h1>{{ title }}</h1>

        <div class="meta">
            <div class="meta-item">
                <div class="meta-label">Date</div>
                <div class="meta-value">{{ created_at }}</div>
            </div>

            <div class="meta-item">
                <div class="meta-label">Duration</div>
                <div class="meta-value">{{ duration_formatted }}</div>
            </div>
        </div>

        <h2>Structured Summary</h2>

        <div class="summary-card">
            {{ summary_html | safe }}
        </div>

    </div>

</body>

</html>
